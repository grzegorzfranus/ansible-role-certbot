- name: Certbot | certificates | Issue certificate (DNS)
  become: true
  no_log: true
  ansible.builtin.command: >-
    certbot certonly
    --non-interactive
    --agree-tos
    --email {{ certbot_email | quote }}
    --cert-name {{ item.name | quote }}
    --domains {{ item.domains | join(',') }}
    --authenticator {{ __certbot_dns_authenticators[certbot_dns_provider] }}
    --{{ __certbot_dns_authenticators[certbot_dns_provider] }}-credentials
    {{ certbot_dns_credentials_path }}/{{ __certbot_dns_credential_files[certbot_dns_provider] }}
    --{{ __certbot_dns_authenticators[certbot_dns_provider] }}-propagation-seconds
    {{ certbot_dns_propagation_seconds }}
    --server {{ __certbot_acme_server }}
    --key-type {{ certbot_key_type }}
    {% if certbot_key_type == 'rsa' %}--rsa-key-size {{ certbot_rsa_key_size }}{% endif %}
    {% if certbot_key_type == 'ecdsa' %}--elliptic-curve {{ certbot_elliptic_curve }}{% endif %}
    --config-dir {{ certbot_config_dir }}
    --work-dir {{ certbot_work_dir }}
    --logs-dir {{ certbot_log_dir }}
  register: __certbot_dns_result
  changed_when: "'Successfully received certificate' in (__certbot_dns_result.stdout | default(''))"
  failed_when:
    - __certbot_dns_result.rc != 0
    - "'Certificate not yet due for renewal' not in (__certbot_dns_result.stderr | default(''))"
  loop: "{{ __certbot_cert_requests | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not item.exists
    - item.validation_method == 'dns'
    - not ansible_check_mode

- name: Certbot | certificates | Verify issued certificates
  become: true
  ansible.builtin.stat:
    path: "{{ __certbot_live_dir }}/{{ item.name }}/fullchain.pem"
  register: __certbot_verify_certs
  loop: "{{ certbot_domains }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode

- name: Certbot | certificates | Report certificate status
  ansible.builtin.debug:
    msg:
      - "Certificate '{{ item.item.name }}': {{ 'PRESENT' if item.stat.exists else 'MISSING' }}"
    verbosity: 1
  loop: "{{ __certbot_verify_certs.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  when:
    - not ansible_check_mode
