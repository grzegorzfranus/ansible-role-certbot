---
role_name_check: 1

dependency:
  name: galaxy
  options:
    ignore-errors: true

driver:
  name: docker

platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
    verify: ${MOLECULE_PLAYBOOK:-verify.yml}
    prepare: ${MOLECULE_PLAYBOOK:-prepare.yml}
  config_options:
    defaults:
      interpreter_python: auto_silent
    ssh_connection:
      pipelining: true
  env:
    ANSIBLE_FORCE_COLOR: "true"
  inventory:
    group_vars:
      all:
        certbot_email: "test@example.com"
        certbot_validation_method: "dns"
        certbot_dns_provider: "cloudflare"
        certbot_cloudflare_api_token: "test-token-not-real"
        certbot_environment: "staging"
        certbot_auto_renewal_enabled: false
        certbot_dry_run_test: false
        certbot_domains: []

verifier:
  name: ansible
  options:
    verbose: true
