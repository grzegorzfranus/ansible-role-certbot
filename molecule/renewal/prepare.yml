---
# Certbot Molecule — Prepare target for renewal scenario.

- name: Molecule | Prepare (renewal)
  hosts: all
  gather_facts: true

  tasks:
    - name: Prepare | Fix /etc/shadow permissions
      ansible.builtin.file:
        path: /etc/shadow
        mode: '0400'

    - name: Prepare | Ensure required directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop:
        - /etc/apt/sources.list.d
      when:
        - ansible_facts['os_family'] == "Debian"

    - name: Prepare | Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      changed_when: false
      when:
        - ansible_facts['os_family'] == "Debian"

    - name: Prepare | Remove conflicting pip crypto packages (Debian 12 Docker compat)
      ansible.builtin.command: pip3 uninstall -y cryptography pyopenssl
      changed_when: true
      failed_when: false
      when:
        - ansible_facts['distribution'] == "Debian"
        - ansible_facts['distribution_major_version'] == "12"

    - name: Prepare | Wait for systemd to complete initialization
      ansible.builtin.systemd:
        name: multi-user.target
        state: started
      register: systemctl_status
      until: true
      retries: 30
      delay: 5
      when:
        - ansible_facts['service_mgr'] == 'systemd'
      changed_when: false
      failed_when: false
